spring:
  application:
    name: tradeforge-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tradeforge}
    username: ${DATABASE_USERNAME:tradeforge}
    password: ${DATABASE_PASSWORD:tradeforge}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-32-bytes-minimum}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
